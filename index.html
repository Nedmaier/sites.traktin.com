<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Трактин Павел - интернет проекты</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 🔝 Верхняя панель -->
  <div class="topbar">

    <!-- 🟢 1-я строка: логотип и кнопка контактов -->
    <div class="topbar-row">
      <a href="https://traktin.com" target="_blank" class="logo-circle">
        <img src="img/traktin_logo.png" alt="Traktin logo" />
      </a>

      <div class="cta-circle" id="contactCircle">
        <span class="order_button">Контакты</span>
		</div>
		<!-- 💬 Выпадающие контактные опции -->
      <div id="contactOptions" class="contact-options"></div>
     
      
    </div>

    <!-- 🎛️ 2-я строка: фильтры -->
    <header>
      <h1>Интернет-проекты</h1>
      <div class="controls">
        <label>
          <select id="sortSelect">
            <option value="year">По дате</option>
            <option value="name">По названию</option>
          </select>
        </label>

        <label>
          <select id="filterSelect">
            <option value="all">Все проекты</option>
            <option value="shop">Интернет-магазины</option>
            <option value="company">Сайты компаний</option>
            <option value="marketplace">Маркет-плейсы</option>
            <option value="booking">Системы бронирования</option>
            <option value="traveltech">Travel-Tech</option>
            <option value="ai">AI и автоматизация</option>
          </select>
        </label>
      </div>
    </header>
  </div>

  <!-- 📄 3-я строка: проекты -->
  <main id="projectsContainer"></main>

  <!-- 🪟 Модальное окно -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <div class="slider" id="slider"></div>
    </div>
  </div>

  <script src="projects.js"></script>
  <script src="script.js"></script>
</body>
</html>
